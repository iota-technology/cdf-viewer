name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Building version $VERSION"

      - name: Update version in Xcode project
        run: |
          cd CDFViewer
          # Update marketing version (e.g., 1.0.0)
          sed -i '' "s/MARKETING_VERSION = [^;]*/MARKETING_VERSION = ${{ steps.version.outputs.version }}/" CDFViewer.xcodeproj/project.pbxproj
          # Update build number using run number for uniqueness
          sed -i '' "s/CURRENT_PROJECT_VERSION = [^;]*/CURRENT_PROJECT_VERSION = ${{ github.run_number }}/" CDFViewer.xcodeproj/project.pbxproj

      - name: Install certificate
        env:
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          # Create temporary keychain
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)

          # Create keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Import certificate
          echo "$APPLE_CERTIFICATE_BASE64" | base64 --decode > $RUNNER_TEMP/certificate.p12
          security import $RUNNER_TEMP/certificate.p12 -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"

          # Allow codesign to access keychain
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Add to search list
          security list-keychain -d user -s "$KEYCHAIN_PATH" login.keychain

          # Clean up certificate file
          rm $RUNNER_TEMP/certificate.p12

      - name: Build and sign app
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          cd CDFViewer
          xcodebuild -scheme CDFViewer \
            -configuration Release \
            -derivedDataPath build \
            clean \
            -archivePath build/CDFViewer.xcarchive \
            archive \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Developer ID Application" \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID"

      - name: Export signed app from archive
        run: |
          cd CDFViewer
          mkdir -p build/Export
          cp -R build/CDFViewer.xcarchive/Products/Applications/CDFViewer.app build/Export/

      - name: Re-sign Sparkle framework for notarization
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          cd CDFViewer/build/Export/CDFViewer.app/Contents/Frameworks/Sparkle.framework

          # Sign XPC services first (innermost)
          codesign --force --timestamp --options runtime \
            -s "Developer ID Application" \
            --identifier "org.sparkle-project.Downloader" \
            Versions/B/XPCServices/Downloader.xpc

          codesign --force --timestamp --options runtime \
            -s "Developer ID Application" \
            --identifier "org.sparkle-project.Installer" \
            Versions/B/XPCServices/Installer.xpc

          # Sign Updater.app
          codesign --force --timestamp --options runtime \
            -s "Developer ID Application" \
            --identifier "org.sparkle-project.Updater" \
            Versions/B/Updater.app

          # Sign Autoupdate executable
          codesign --force --timestamp --options runtime \
            -s "Developer ID Application" \
            Versions/B/Autoupdate

          # Sign the framework itself
          codesign --force --timestamp --options runtime \
            -s "Developer ID Application" \
            --identifier "org.sparkle-project.Sparkle" \
            Versions/B

          # Go back to Export directory
          cd ../../../..

          # Re-sign QuickLook extension with hardened runtime
          codesign --force --timestamp --options runtime \
            -s "Developer ID Application" \
            CDFViewer.app/Contents/PlugIns/CDFQuickLook.appex

          # Re-sign the main app
          codesign --force --timestamp --options runtime \
            -s "Developer ID Application" \
            CDFViewer.app

          # Verify everything
          codesign --verify --deep --strict CDFViewer.app
          echo "All signatures verified successfully"

      - name: Setup notarization credentials
        env:
          APPLE_API_KEY_BASE64: ${{ secrets.APPLE_API_KEY_BASE64 }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
        run: |
          # Create AuthKey directory
          mkdir -p ~/private_keys

          # Decode and save the API key
          echo "$APPLE_API_KEY_BASE64" | base64 --decode > ~/private_keys/AuthKey_${APPLE_API_KEY_ID}.p8

      - name: Create zip for notarization
        run: |
          cd CDFViewer/build/Export
          /usr/bin/ditto -c -k --keepParent CDFViewer.app CDFViewer-${{ steps.version.outputs.version }}.zip

      - name: Notarize app
        env:
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
        run: |
          cd CDFViewer/build/Export

          # Submit for notarization and capture the submission ID
          SUBMISSION_OUTPUT=$(xcrun notarytool submit CDFViewer-${{ steps.version.outputs.version }}.zip \
            --key ~/private_keys/AuthKey_${APPLE_API_KEY_ID}.p8 \
            --key-id "$APPLE_API_KEY_ID" \
            --issuer "$APPLE_API_ISSUER_ID" \
            --wait 2>&1) || true

          echo "$SUBMISSION_OUTPUT"

          # Extract submission ID
          SUBMISSION_ID=$(echo "$SUBMISSION_OUTPUT" | grep "id:" | head -1 | awk '{print $2}')
          echo "Submission ID: $SUBMISSION_ID"

          # Check if notarization succeeded
          if echo "$SUBMISSION_OUTPUT" | grep -q "status: Accepted"; then
            echo "Notarization succeeded!"
          else
            echo "Notarization failed. Fetching log..."
            xcrun notarytool log "$SUBMISSION_ID" \
              --key ~/private_keys/AuthKey_${APPLE_API_KEY_ID}.p8 \
              --key-id "$APPLE_API_KEY_ID" \
              --issuer "$APPLE_API_ISSUER_ID" \
              notarization-log.json || true
            cat notarization-log.json
            exit 1
          fi

      - name: Staple notarization ticket
        run: |
          cd CDFViewer/build/Export

          # Staple the ticket to the app
          xcrun stapler staple CDFViewer.app

          # Verify stapling
          xcrun stapler validate CDFViewer.app
          echo "Notarization ticket stapled successfully"

      - name: Re-create zip with stapled app
        run: |
          cd CDFViewer/build/Export
          rm CDFViewer-${{ steps.version.outputs.version }}.zip
          /usr/bin/ditto -c -k --keepParent CDFViewer.app CDFViewer-${{ steps.version.outputs.version }}.zip
          ls -la CDFViewer-*.zip

      - name: Download Sparkle
        run: |
          # Download Sparkle for the signing tools
          curl -L -o sparkle.tar.xz https://github.com/sparkle-project/Sparkle/releases/download/2.8.1/Sparkle-2.8.1.tar.xz
          mkdir -p sparkle-tools
          tar -xf sparkle.tar.xz -C sparkle-tools
          ls -la sparkle-tools/bin/

      - name: Sign update with EdDSA
        id: sign
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          # Write private key to temp file
          echo "$SPARKLE_PRIVATE_KEY" > /tmp/sparkle_private.pem

          # Get file size
          FILE_SIZE=$(stat -f%z CDFViewer/build/Export/CDFViewer-${{ steps.version.outputs.version }}.zip)

          # Sign the zip file with EdDSA
          SIGNATURE=$(sparkle-tools/bin/sign_update CDFViewer/build/Export/CDFViewer-${{ steps.version.outputs.version }}.zip --ed-key-file /tmp/sparkle_private.pem | grep "sparkle:edSignature" | sed 's/.*sparkle:edSignature="\([^"]*\)".*/\1/')

          echo "signature=$SIGNATURE" >> $GITHUB_OUTPUT
          echo "file_size=$FILE_SIZE" >> $GITHUB_OUTPUT

          # Clean up
          rm /tmp/sparkle_private.pem

      - name: Generate appcast
        run: |
          cat > CDFViewer/build/Export/appcast.xml << EOF
          <?xml version="1.0" encoding="utf-8"?>
          <rss version="2.0" xmlns:sparkle="http://www.andymatuschak.org/xml-namespaces/sparkle" xmlns:dc="http://purl.org/dc/elements/1.1/">
            <channel>
              <title>CDF Viewer Updates</title>
              <description>Most recent changes with links to updates.</description>
              <language>en</language>
              <item>
                <title>Version ${{ steps.version.outputs.version }}</title>
                <pubDate>$(date -R)</pubDate>
                <sparkle:version>${{ github.run_number }}</sparkle:version>
                <sparkle:shortVersionString>${{ steps.version.outputs.version }}</sparkle:shortVersionString>
                <sparkle:minimumSystemVersion>14.0</sparkle:minimumSystemVersion>
                <enclosure
                  url="https://github.com/iota-technology/cdf-viewer/releases/download/v${{ steps.version.outputs.version }}/CDFViewer-${{ steps.version.outputs.version }}.zip"
                  sparkle:edSignature="${{ steps.sign.outputs.signature }}"
                  length="${{ steps.sign.outputs.file_size }}"
                  type="application/octet-stream" />
              </item>
            </channel>
          </rss>
          EOF
          cat CDFViewer/build/Export/appcast.xml

      - name: Cleanup keychain and credentials
        if: always()
        run: |
          # Remove the temporary keychain
          security delete-keychain $RUNNER_TEMP/app-signing.keychain-db || true
          # Remove API key
          rm -rf ~/private_keys || true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          name: CDF Viewer v${{ steps.version.outputs.version }}
          body: |
            ## CDF Viewer v${{ steps.version.outputs.version }}

            ### Installation
            1. Download `CDFViewer-${{ steps.version.outputs.version }}.zip`
            2. Unzip the archive
            3. Drag `CDFViewer.app` to your Applications folder
            4. Open the app

            This release is code-signed and notarized by Apple for your security.

            ### Auto-Updates
            This version includes automatic update checking via Sparkle. Once installed, the app will notify you of future updates.

            ### Requirements
            - macOS 14.0 (Sonoma) or later
          files: |
            CDFViewer/build/Export/CDFViewer-${{ steps.version.outputs.version }}.zip
            CDFViewer/build/Export/appcast.xml
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
